<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thomas Deitel: Personal site and portfolio</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="index.js" defer></script>
</head>
<body>
  <main class="home-layout">
    <section class="home-hero">
      <div class="home-copy">
        <p class="eyebrow">Student · Builder · Researcher</p>
        <h1>Thomas Deitel</h1>
        <p>I build software and data products across AI, healthcare, business strategy, and visualization. This portfolio now pulls project data dynamically and surfaces live GitHub profile stats on the homepage.</p>
      </div>
      <img src="images/bentley.jpg" alt="A small black and brown dog standing in a grassy field while holding a plush toy.">
    </section>

    <section aria-labelledby="latest-projects-heading">
      <h2 id="latest-projects-heading">Latest Projects</h2>
      <div class="projects"></div>
    </section>

    <section aria-labelledby="github-heading">
      <h2 id="github-heading">GitHub Profile Snapshot</h2>
      <div id="profile-stats"></div>
    </section>
  </main>
</body>
</html>
