<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thomas Deitel: Projects</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="projects.js" defer></script>
</head>
<body>
  <main>
    <section aria-labelledby="projects-heading">
      <h1 class="projects-title" id="projects-heading">Projects</h1>
      <p>The projects on this page are loaded from a shared JSON file, so the same data can power both this page and the homepage preview automatically.</p>
      <div class="projects-chart" aria-label="Project count by year">
        <svg id="projects-pie-plot" viewBox="-50 -50 100 100" role="img" aria-label="Pie chart of projects by year"></svg>
        <ul class="legend" aria-label="Project years legend"></ul>
      </div>
      <input
        class="searchBar"
        type="search"
        aria-label="Search projects"
        placeholder="Search projects..."
      >
      <div class="projects"></div>
    </section>
  </main>
</body>
</html>
