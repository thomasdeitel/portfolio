<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thomas Deitel: Contact</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="../global.js"></script>
</head>
<body>
  <h1>Contact</h1>
  <form action="mailto:tdeitel@ucsd.edu" method="GET">
    <label>
      Email
      <input name="email" type="email" value="visitor@example.com" required>
    </label>
    <label>
      Subject
      <input name="subject" value="Hello Thomas" required>
    </label>
    <label>
      Message
      <textarea name="body" rows="6" required>I found your portfolio and wanted to reach out.</textarea>
    </label>
    <button>Send</button>
  </form>
</body>
</html>
